<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Jansori</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --bg: #1c1618;
      --surface: #271e21;
      --surface-hover: #322a2d;
      --border: #3e3336;
      --border-light: #4a3d42;
      --text: #e8ddd0;
      --text-dim: #9a8b80;
      --burgundy: #a3454a;
      --burgundy-soft: #8a3a3f;
      --burgundy-glow: rgba(163, 69, 74, 0.15);
      --burgundy-bright: #c75a5f;
      --walk-color: #b89a6e;
      --walk-glow: rgba(184, 154, 110, 0.12);
      --hydra-color: #6e9fb8;
      --hydra-glow: rgba(110, 159, 184, 0.12);
      --danger: #c47070;
      --radius: 10px;
      --font-display: 'Libre Baskerville', 'Noto Sans KR', serif;
      --font-body: 'Noto Sans KR', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 350px;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      font-size: 13px;
      font-weight: 400;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .brand h1 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--burgundy-bright);
      letter-spacing: -0.5px;
    }
    .brand .hangul {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-dim);
    }

    /* Language toggle */
    .lang-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      font-size: 11px;
      font-weight: 500;
    }
    .lang-btn {
      padding: 4px 10px;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 11px;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: var(--burgundy-glow);
      color: var(--burgundy-bright);
    }

    .tagline {
      font-size: 11.5px;
      color: var(--text-dim);
      font-style: italic;
      font-family: var(--font-display);
      margin-bottom: 16px;
    }

    /* ── Reminder card ── */
    .reminder-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    .reminder-card.disabled { opacity: 0.4; }
    .reminder-card.disabled .card-body { pointer-events: none; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
    }
    .card-title .emoji { font-size: 15px; line-height: 1; }
    .card-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-status {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 8px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .card-status.on { background: var(--burgundy-glow); color: var(--burgundy-bright); }
    .card-status.off { color: var(--text-dim); }
    .reminder-card[data-type="walk"] .card-status.on { background: var(--walk-glow); color: var(--walk-color); }
    .reminder-card[data-type="hydration"] .card-status.on { background: var(--hydra-glow); color: var(--hydra-color); }

    .card-body {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Range inputs ── */
    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--burgundy);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      transition: background 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      background: var(--burgundy-bright);
    }
    .reminder-card[data-type="walk"] input[type="range"]::-webkit-slider-thumb { background: var(--walk-color); }
    .reminder-card[data-type="hydration"] input[type="range"]::-webkit-slider-thumb { background: var(--hydra-color); }

    .interval-label {
      font-size: 13px;
      font-weight: 700;
      min-width: 48px;
      text-align: right;
      white-space: nowrap;
    }
    .reminder-card[data-type="posture"] .interval-label { color: var(--burgundy-bright); }
    .reminder-card[data-type="walk"] .interval-label { color: var(--walk-color); }
    .reminder-card[data-type="hydration"] .interval-label { color: var(--hydra-color); }

    /* ── Toggle ── */
    .toggle-wrap { position: relative; flex-shrink: 0; }
    .toggle-input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-label {
      display: block;
      width: 36px;
      height: 19px;
      background: var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.25s;
      position: relative;
    }
    .toggle-label::after {
      content: '';
      position: absolute;
      top: 2.5px;
      left: 2.5px;
      width: 14px;
      height: 14px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle-input:checked + .toggle-label { background: var(--burgundy); }
    .toggle-input:checked + .toggle-label::after {
      transform: translateX(17px);
      background: var(--bg);
    }
    .reminder-card[data-type="walk"] .toggle-input:checked + .toggle-label { background: var(--walk-color); }
    .reminder-card[data-type="hydration"] .toggle-input:checked + .toggle-label { background: var(--hydra-color); }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    /* ── Section ── */
    .section { margin-bottom: 12px; }
    .section-title {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 7px;
    }

    /* ── Notification row ── */
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
    }
    .option-label {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ── Sound grid ── */
    .sound-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }
    .sound-option {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .sound-option:hover { background: var(--surface-hover); border-color: var(--border-light); }
    .sound-option.selected {
      border-color: var(--burgundy-soft);
      background: var(--burgundy-glow);
      color: var(--burgundy-bright);
    }
    .sound-option .sound-icon { font-size: 14px; line-height: 1; }

    /* ── Custom sounds ── */
    .upload-row { margin-top: 5px; }
    .upload-btn {
      width: 100%;
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--text-dim);
      font-size: 11.5px;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .upload-btn:hover { border-color: var(--burgundy-soft); color: var(--text); }

    .custom-sound {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 5px;
    }
    .custom-sound:hover { background: var(--surface-hover); }
    .custom-sound.selected {
      border-color: var(--burgundy-soft);
      background: var(--burgundy-glow);
      color: var(--burgundy-bright);
    }
    .custom-sound .remove-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .custom-sound .remove-btn:hover { opacity: 1; }

    /* ── Volume ── */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
    }
    .volume-row .vol-icon { font-size: 13px; }
    .volume-pct {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 28px;
      text-align: right;
    }

    /* ── Test buttons ── */
    .test-row { display: flex; gap: 5px; }
    .test-btn {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
      color: var(--text-dim);
      font-size: 11.5px;
      font-weight: 500;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.15s;
    }
    .test-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: var(--burgundy-soft);
    }
    .test-btn:active { transform: scale(0.97); }

    /* ── Footer ── */
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      opacity: 0.6;
      letter-spacing: 0.3px;
    }
    .footer a {
      color: var(--text-dim);
      text-decoration: none;
    }
    .footer a:hover { color: var(--burgundy-bright); }

    #fileInput { display: none; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <h1 id="brandName">Jansori</h1>
      <span class="hangul" id="brandHangul">잔소리</span>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ko">한국어</button>
    </div>
  </div>
  <div class="tagline" id="tagline">Your caring desk companion</div>

  <!-- Posture -->
  <div class="reminder-card" data-type="posture" id="card-posture">
    <div class="card-header">
      <div class="card-title"><span class="emoji">🪑</span> <span data-i18n="posture">Posture</span></div>
      <div class="card-right">
        <span class="card-status on" id="status-posture" data-i18n-on="on" data-i18n-off="off">ON</span>
        <div class="toggle-wrap">
          <input type="checkbox" id="toggle-posture" class="toggle-input" checked>
          <label for="toggle-posture" class="toggle-label"></label>
        </div>
      </div>
    </div>
    <div class="card-body">
      <input type="range" id="interval-posture" min="5" max="60" step="5" value="20">
      <span class="interval-label" id="intervalLabel-posture">20 min</span>
    </div>
  </div>

  <!-- Walk -->
  <div class="reminder-card disabled" data-type="walk" id="card-walk">
    <div class="card-header">
      <div class="card-title"><span class="emoji">🚶</span> <span data-i18n="walk">Walk Break</span></div>
      <div class="card-right">
        <span class="card-status off" id="status-walk" data-i18n-on="on" data-i18n-off="off">OFF</span>
        <div class="toggle-wrap">
          <input type="checkbox" id="toggle-walk" class="toggle-input">
          <label for="toggle-walk" class="toggle-label"></label>
        </div>
      </div>
    </div>
    <div class="card-body">
      <input type="range" id="interval-walk" min="15" max="120" step="5" value="45">
      <span class="interval-label" id="intervalLabel-walk">45 min</span>
    </div>
  </div>

  <!-- Hydration -->
  <div class="reminder-card disabled" data-type="hydration" id="card-hydration">
    <div class="card-header">
      <div class="card-title"><span class="emoji">💧</span> <span data-i18n="hydration">Hydration</span></div>
      <div class="card-right">
        <span class="card-status off" id="status-hydration" data-i18n-on="on" data-i18n-off="off">OFF</span>
        <div class="toggle-wrap">
          <input type="checkbox" id="toggle-hydration" class="toggle-input">
          <label for="toggle-hydration" class="toggle-label"></label>
        </div>
      </div>
    </div>
    <div class="card-body">
      <input type="range" id="interval-hydration" min="10" max="60" step="5" value="30">
      <span class="interval-label" id="intervalLabel-hydration">30 min</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Notifications -->
  <div class="section">
    <div class="option-row">
      <div class="option-label">🔔 <span data-i18n="notifications">Pop-up notifications</span></div>
      <div class="toggle-wrap">
        <input type="checkbox" id="toggle-notifications" class="toggle-input" checked>
        <label for="toggle-notifications" class="toggle-label"></label>
      </div>
    </div>
  </div>

  <!-- Sound -->
  <div class="section">
    <div class="section-title" data-i18n="soundSection">Sound</div>
    <div class="sound-grid" id="soundGrid">
      <div class="sound-option selected" data-sound="gentle-bell">
        <span class="sound-icon">🔔</span> <span data-i18n="gentleBell">Gentle Bell</span>
      </div>
      <div class="sound-option" data-sound="singing-bowl">
        <span class="sound-icon">🎵</span> <span data-i18n="singingBowl">Singing Bowl</span>
      </div>
      <div class="sound-option" data-sound="wood-knock">
        <span class="sound-icon">🪵</span> <span data-i18n="woodKnock">Wood Knock</span>
      </div>
      <div class="sound-option" data-sound="soft-chime">
        <span class="sound-icon">✨</span> <span data-i18n="softChime">Soft Chime</span>
      </div>
    </div>
    <div id="customSoundsList"></div>
    <div class="upload-row">
      <button class="upload-btn" id="uploadBtn" data-i18n="uploadCustom">＋ Upload custom sound</button>
    </div>
    <input type="file" id="fileInput" accept="audio/*">
  </div>

  <!-- Volume -->
  <div class="section">
    <div class="section-title" data-i18n="volume">Volume</div>
    <div class="volume-row">
      <span class="vol-icon">🔈</span>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7">
      <span class="volume-pct" id="volumePct">70%</span>
    </div>
  </div>

  <!-- Test -->
  <div class="section">
    <div class="test-row">
      <button class="test-btn" id="testSoundBtn" data-i18n="testSound">▶ Test Sound</button>
      <button class="test-btn" id="testNotifBtn" data-i18n="testNotif">🔔 Test Notification</button>
    </div>
  </div>

  <div class="footer">by <a href="http://burgundytable.com" target="_blank">BurgundyTable</a></div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
